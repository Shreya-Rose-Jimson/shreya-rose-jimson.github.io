<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal | Shreya Rose Jimson</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        black: '#0a0a0a',
                        white: '#fafafa',
                        gray: {
                            300: '#d1d1d1',
                            500: '#737373',
                            900: '#171717',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans antialiased bg-[#fafafa] text-black dark:bg-[#0a0a0a] dark:text-white transition-colors duration-300">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full bg-white/90 dark:bg-black/90 backdrop-blur-md z-50 border-b border-black/10 dark:border-white/10 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center text-sm font-semibold tracking-wide uppercase">
            <a href="index.html" class="font-display font-bold text-lg hover:text-gray-500 transition-colors">SRJ</a>
            <div class="hidden md:flex gap-8 items-center">
                <a href="index.html#about" class="hover:text-gray-500 transition-colors">About</a>
                <a href="index.html#work" class="hover:text-gray-500 transition-colors">Work</a>
                <a href="blog.html" class="hover:text-gray-500 transition-colors">Journal</a>
                <a href="index.html#contact" class="hover:text-gray-500 transition-colors">Contact</a>
                
                <!-- Theme Toggle -->
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors ml-4" aria-label="Toggle Dark Mode">
                    <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>
            <!-- Mobile Menu Button -->
            <button id="mobile-menu-btn" class="md:hidden block p-2">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden border-t border-black/10 dark:border-white/10 bg-white dark:bg-black md:hidden transition-colors duration-300">
            <div class="flex flex-col px-6 py-4 space-y-4 text-sm font-semibold uppercase">
                <a href="index.html#about">About</a>
                <a href="index.html#work">Work</a>
                <a href="blog.html">Journal</a>
                <a href="index.html#contact">Contact</a>
                <button id="theme-toggle-mobile" class="text-left hover:text-gray-500" aria-label="Toggle Dark Mode">Toggle Theme</button>
            </div>
        </div>
    </nav>

    <!-- Blog Container -->
    <section class="pt-32 pb-24 min-h-screen">
        <div class="max-w-4xl mx-auto px-6">
            <h1 class="font-display text-5xl md:text-6xl font-bold tracking-tight mb-4">Journal</h1>
            <p class="text-xl text-gray-600 dark:text-gray-400 mb-12">Thoughts, research notes, and updates.</p>
            
            <div id="blog-filters" class="flex flex-wrap gap-3 mb-16 hidden">
                <!-- Dynamic filters will be injected here -->
            </div>
            
            <div id="blog-list-container" class="w-full space-y-16">
                <!-- Dynamic blog categories will be injected here -->
                <div class="animate-pulse space-y-4">
                    <div class="h-8 bg-gray-200 dark:bg-gray-800 w-1/3 rounded-sm mb-6"></div>
                    <div class="h-20 bg-gray-200 dark:bg-gray-800 w-full rounded-sm"></div>
                    <div class="h-20 bg-gray-200 dark:bg-gray-800 w-full rounded-sm"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Contact Section / Footer -->
    <section class="py-12 border-t border-black/10 dark:border-white/10 bg-black text-white dark:bg-black transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-sm text-gray-500 uppercase tracking-widest font-mono">
                &copy; <span id="year"></span> Shreya Rose Jimson. Built with precision.
            </p>
        </div>
    </section>

    <!-- External JS -->
    <script src="js/theme.js"></script>
    <script src="js/main.js"></script>
    <script src="js/blog.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mobileThemeToggle = document.getElementById('theme-toggle-mobile');
            const themeToggleBtn = document.getElementById('theme-toggle');
            if (mobileThemeToggle && themeToggleBtn) {
                mobileThemeToggle.addEventListener('click', () => {
                    themeToggleBtn.click();
                });
            }
        });
    </script>
</body>
</html>
